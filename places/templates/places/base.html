<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Hiroshima Through Film{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Lightbox -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/css/lightbox.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    {% load static %}
    <link rel="stylesheet" href="{% static 'places/style.css' %}">

    <style>
        .lb-close {
            font-size: 34px !important;
            color: white !important;
            opacity: 1 !important;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container">

        <a class="navbar-brand" href="{% url 'home' %}">
            Hiroshima Through Film
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navMenu">

            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
                       href="{% url 'home' %}">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}"
                       href="{% url 'about' %}">
                        About
                    </a>
                </li>
                <a class="nav-link" href="{% url 'location_map' %}">Map</a>
            </ul>

        </div>

    </div>
</nav>

<!-- PAGE WRAPPER -->
<div class="container mt-3">

    <!-- ★パンくず用ブロック（ここが重要） -->
    {% block breadcrumb %}{% endblock %}

    <!-- メインコンテンツ -->
    {% block content %}{% endblock %}

</div>

<!-- FOOTER -->
<footer class="mt-5 py-4 border-top">

    <div class="container text-center">

        <p class="text-muted mb-2">
            Hiroshima Through Film
        </p>

        <a href="https://youtube.com/@my-life-hiroshima?si=MXp79HU9SABtklcJ"
           target="_blank"
           class="me-3">
            YouTube
        </a>

        <a href="https://www.reddit.com/user/hiroshima_travel/?utm_source=share&utm_medium=web3x&utm_name=web3xcss&utm_term=1&utm_content=share_button" target="_blank">
            Reddit
        </a>

        <div class="mt-2">
            <small class="text-muted">
                © 2026 Hiroshima Through Film
            </small>
        </div>

    </div>

</footer>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.4/js/lightbox.min.js"></script>

<script>
lightbox.option({
    fadeDuration: 200,
    resizeDuration: 200,
    wrapAround: true,
    albumLabel: "Image %1 of %2",
    disableScrolling: true,
    alwaysShowNavOnTouchDevices: true
});
</script>

</body>
</html>
