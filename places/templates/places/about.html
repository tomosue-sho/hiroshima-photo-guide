{% extends 'places/base.html' %}

{% block content %}

<div class="container">

    {% if about %}

        {% if about.image %}
            <img src="{{ about.image.url }}" class="hero-photo mb-4">
        {% endif %}

        <h1 class="display-4 mb-3">
            {{ about.title }}
        </h1>

        <p class="lead">
            {{ about.description }}
        </p>

        {% if about.images.all %}

        <div class="row g-3 mb-5">

            {% for img in about.images.all %}
                <div class="col-6 col-md-4">
                    <img src="{{ img.image.url }}" class="img-fluid rounded shadow-sm">
                </div>
            {% endfor %}

        </div>

        {% endif %}

    {% else %}

        <p>No about content found.</p>

    {% endif %}

</div>

{% endblock %}
